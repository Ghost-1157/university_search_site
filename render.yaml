services:
  - type: web
    name: practice-database-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: practice-database-postgres
          property: connectionString

databases:
  - name: practice-database-postgres
    databaseName: practice_for_practice
    user: postgres
    plan: free
    region: oregon
    postgresMajorVersion: "15"