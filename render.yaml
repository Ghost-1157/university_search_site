services:
  - type: web
    name: practice-database-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: practice-database-postgres
          property: connectionString
    disk:
      name: data
      mountPath: /data
      sizeGB: 1

databases:
  - name: practice-database-postgres
    dbName: practice_for_practice
    user: postgres
    plan: free
    region: oregon
    postgresMajorVersion: "15"
databases:
  - name: practice-database-postgres
    databaseName: practice_for_practice
    user: practice_database_user

services:
  - type: web
    name: practice-database-web
    runtime: node
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: practice-database-postgres
          property: connectionString
      - key: DB_SSL
        value: "true"